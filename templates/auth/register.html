{% extends "base.html" %} {% block title %}Register{% endblock title %} {% block
content %}
<div
  class="container-fluid d-flex justify-content-center align-items-center vh-100"
>
  <div class="card" style="width: 25rem">
    <div class="card-body">
      <h5 class="card-title">Register</h5>
      <form action="" method="POST">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            placeholder="Enter Name"
            required
          />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="name@example.com"
            required
          />
        </div>
        <div class="mb-3">
          <label for="roll_no" class="form-label">Roll Number</label>
          <input
            type="number"
            class="form-control"
            id="roll_no"
            name="roll_no"
            placeholder="Enter Roll Number"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Enter Password"
            required
          />
        </div>
        <div class="mb-3">
          <label for="role" class="form-label"></label>
          <select class="form-select" id="role" name="role">
            <option value="">Select role</option>
            <option value="student">Student</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Register</button>
        </div>

        <div class="mt-3 text-center">
          <span
            >Have an account?
            <a href="/login" class="text-decoration-none">Log in</a></span
          >
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
